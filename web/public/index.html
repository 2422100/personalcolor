<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>personal color filter app</title>
    <script src="script.js" defer></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color:ivory;
            overflow: hidden;
        }
        .wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
            box-sizing: border-box;
            text-align: center;
        }
        h1 {
            font-size: 1.2em;
            margin: 0 0 10px 0;
            flex-shrink: 0;
        }
        .media-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
            min-height: 0;
        }

        #video, #canvasOutput {
            width: 100%;
            height: 100%;
            max-width: 512px;
            object-fit: contain; 
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #000;
        }

        .main-controls {
            flex-shrink: 0;
            padding-top: 10px;
            overflow-y: auto;
        }

        .controls, .info, #colorDisplay {
            margin-bottom: 8px;
        }

        button {
            padding: 8px 10px;
            margin: 4px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            font-size: 0.9em;
        }
        button:hover {
            background-color: #0056b3;
        }

        #diagnoseButton {
            background-color: #28a745;
        }
        #diagnoseButton:hover {
            background-color: #218838;
        }
        
        p {
            margin: 4px 0;
            font-size: 0.8em;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <h1>Personal Color Filter App (Web版)</h1>

        <div class="media-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvasOutput" width="512" height="512"></canvas>
        </div>

        <canvas id="canvasInput" width="512" height="512" style="display:none;"></canvas>

    </div>
</body>
</html>
